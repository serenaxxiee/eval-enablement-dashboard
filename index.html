  :root {
    --blue: #0078D4;
    --navy: #243A5E;
    --cyan: #50E6FF;
    --white: #FFFFFF;
    --lgray: #F0F0F0;
    --mgray: #666666;
    --border: #E0E0E0;
    --sidebar-w: 240px;
    --fw-blue: #0078D4;
    --fw-green: #107C10;
    --fw-cyan: #50E6FF;
    --fw-orange: #D83B01;
    --fw-purple: #8661C5;
    --fw-teal: #038387;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    font-family: Calibri, "Segoe UI", sans-serif;
    background: #F7F8FA;
    color: var(--navy);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--navy);
    display: flex; flex-direction: column;
    z-index: 10;
    box-shadow: 2px 0 12px rgba(0,0,0,.12);
  }
  .sidebar-brand {
    padding: 32px 28px 8px;
    font-family: "Trebuchet MS", sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,.45);
    text-transform: uppercase;
  }
  .sidebar-title {
    padding: 0 28px 28px;
    font-family: "Trebuchet MS", sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }
  .sidebar-title span { color: var(--cyan); }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .sidebar-nav button {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 14px 28px;
    border: none; background: transparent;
    font-family: Calibri, "Segoe UI", sans-serif;
    font-size: 14px; color: rgba(255,255,255,.7);
    cursor: pointer; transition: all .2s;
    border-left: 3px solid transparent;
    text-align: left;
  }
  .sidebar-nav button:hover { color: var(--white); background: rgba(255,255,255,.06); }
  .sidebar-nav button.active {
    color: var(--cyan); border-left-color: var(--cyan);
    background: rgba(80,230,255,.07);
    font-weight: 600;
  }
  .sidebar-nav button .nav-icon {
    width: 20px; height: 20px; display: flex;
    align-items: center; justify-content: center;
    font-size: 16px; opacity: .7;
  }
  .sidebar-nav button.active .nav-icon { opacity: 1; }
  .sidebar-footer {
    padding: 20px 28px;
    border-top: 1px solid rgba(255,255,255,.1);
    font-size: 10px; color: #8899AA;
    letter-spacing: .5px;
  }

  /* ── Main ── */
  .main { margin-left: var(--sidebar-w); padding: 48px 56px 80px; min-height: 100vh; }

  /* ── Home: Hero ── */
  .hero-title {
    font-family: "Trebuchet MS", sans-serif;
    font-size: 34px; font-weight: 700;
    color: var(--navy); line-height: 1.15;
  }
  .hero-subtitle {
    font-size: 16px; color: var(--mgray);
    margin-top: 8px; max-width: 620px; line-height: 1.5;
  }

  /* ── Quick-start navigator ── */
  .quickstart-section { margin: 32px 0 0; }
  .quickstart-label {
    font-family: "Trebuchet MS", sans-serif;
    font-weight: 700; color: var(--navy);
    margin-bottom: 16px; letter-spacing: .3px;
    text-transform: uppercase; opacity: .55; font-size: 11px;
  }
  .quickstart-grid { display: flex; gap: 14px; flex-wrap: wrap; }
  .quickstart-card {
    flex: 1; min-width: 200px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 20px 18px;
    cursor: pointer;
    transition: box-shadow .2s, transform .15s, border-color .2s;
    position: relative; overflow: hidden;
  }
  .quickstart-card:hover {
    box-shadow: 0 6px 20px rgba(0,120,212,.12);
    transform: translateY(-2px);
    border-color: var(--blue);
  }
  .quickstart-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .quickstart-stage {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 6px;
  }
  .quickstart-question {
    font-size: 14px; font-weight: 700; color: var(--navy);
    line-height: 1.3; margin-bottom: 6px;
  }
  .quickstart-answer {
    font-size: 12px; color: var(--mgray); line-height: 1.4;
  }
  .quickstart-arrow {
    font-size: 12px; color: var(--blue); font-weight: 600;
    margin-top: 10px; display: inline-block;
  }

  /* ── Purpose Flow ── */
  .purpose-flow-section { margin: 48px 0 40px; }
  .purpose-flow-label {
    font-family: "Trebuchet MS", sans-serif;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 24px;
    letter-spacing: .3px;
    text-transform: uppercase;
    opacity: .55; font-size: 11px;
  }
  .purpose-flow {
    display: flex; align-items: stretch;
    gap: 0; position: relative;
  }
  .purpose-flow-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; text-align: center;
    cursor: pointer; position: relative;
    padding: 28px 20px 24px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: box-shadow .2s, transform .15s;
    min-width: 180px;
  }
  .purpose-flow-item:hover {
    box-shadow: 0 6px 20px rgba(0,120,212,.12);
    transform: translateY(-2px);
  }
  .purpose-flow-icon {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 12px;
    color: var(--white);
  }
  .purpose-flow-name {
    font-family: "Trebuchet MS", sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--navy); margin-bottom: 6px;
  }
  .purpose-flow-desc {
    font-size: 12px; color: var(--mgray);
    line-height: 1.4; max-width: 180px;
  }
  .purpose-flow-count {
    font-size: 11px; color: var(--blue);
    margin-top: 10px; font-weight: 600;
  }
  .purpose-flow-arrow {
    display: flex; align-items: center; justify-content: center;
    width: 48px; flex-shrink: 0;
    font-size: 24px; color: var(--cyan);
  }

    background: linear-gradient(135deg, rgba(0,120,212,.03), rgba(80,230,255,.04));
    border-radius: 10px;
    border-left: 3px solid var(--cyan);

    font-family: "Trebuchet MS", sans-serif;
    font-size: 28px; font-weight: 700;
    color: var(--navy); margin-bottom: 8px;
  }
  .view-subtitle {
    font-size: 14px; color: var(--mgray);
    margin-bottom: 28px; line-height: 1.5;
  }

  .subsection-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .subsection-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--blue); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;

  .subsection-name {
    font-family: "Trebuchet MS", sans-serif;
    font-size: 18px; font-weight: 700; color: var(--navy);
  }
  .subsection-desc { font-size: 13px; color: var(--mgray); margin-top: 2px; }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);

    cursor: default;

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .card-info { flex: 1; }
  .card-name { font-size: 15px; font-weight: 700; color: var(--navy); line-height: 1.3; }
  .card-oneliner { font-size: 12px; color: var(--mgray); margin-top: 4px; line-height: 1.4; }
  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    letter-spacing: .3px;
  }

  /* Type badges */
  .badge-framework    { background: #E3F2FD; color: #1565C0; }
  .badge-template     { background: #E8F5E9; color: #2E7D32; }
  .badge-training     { background: #E0F7FA; color: #00838F; }
  .badge-playbook     { background: #FFF3E0; color: #E65100; }
  .badge-reference    { background: #F3E5F5; color: #7B1FA2; }
  .badge-presentation { background: #FFF8E1; color: #F57F17; }

  .card-toggle {
    border: none; background: transparent;
    color: var(--blue); font-size: 12px;
    cursor: pointer; white-space: nowrap;
    font-family: Calibri, "Segoe UI", sans-serif;
    padding: 4px 0; flex-shrink: 0;
    transition: color .15s;
  }
  .card-toggle:hover { color: #005a9e; }

  /* expanded */
  .card-details {
    overflow: hidden;
    transition: max-height .3s ease, opacity .25s ease;
    max-height: 0; opacity: 0;
  }
  .card-details.open { max-height: 600px; opacity: 1; }
  .card-details-inner { padding-top: 16px; border-top: 1px solid var(--border); margin-top: 14px; }
  .detail-label { font-size: 12px; font-weight: 700; color: var(--navy); margin-top: 12px; }
  .detail-label:first-child { margin-top: 0; }
  .detail-text { font-size: 12px; color: #333; line-height: 1.6; margin-top: 2px; }
  .detail-meta {
    display: flex; gap: 24px; flex-wrap: wrap;
    margin-top: 14px; font-size: 12px; color: var(--navy);
  }
  .detail-meta strong { font-weight: 700; }
  .detail-links { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-links a {
    color: var(--blue); font-size: 12px;
    text-decoration: underline; transition: color .15s;
  }
  .detail-links a:hover { color: #005a9e; }

  /* left accent bar on card by type */
  .card[data-type="Framework"]    { border-left: 4px solid var(--fw-blue); }
  .card[data-type="Template"]     { border-left: 4px solid var(--fw-green); }
  .card[data-type="Training"]     { border-left: 4px solid var(--fw-cyan); }
  .card[data-type="Playbook"]     { border-left: 4px solid var(--fw-orange); }
  .card[data-type="Reference"]    { border-left: 4px solid var(--fw-purple); }
  .card[data-type="Presentation"] { border-left: 4px solid var(--fw-teal); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeUp .45s ease both; }
  .anim-d1 { animation-delay: .05s; }
  .anim-d2 { animation-delay: .1s; }
  .anim-d3 { animation-delay: .15s; }
  .anim-d4 { animation-delay: .2s; }
  .anim-d5 { animation-delay: .25s; }
  .anim-d6 { animation-delay: .3s; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; padding: 32px 28px 60px; }
    .hero-title { font-size: 26px; }
    .purpose-flow { flex-direction: column; }
    .purpose-flow-arrow { width: auto; height: 32px; transform: rotate(90deg); }
  }
</style>
</head>

          <div className="detail-text">{asset.purpose}</div>
          <div className="detail-meta">
            <div><strong>How:</strong> {asset.how.join(", ")}</div>
            <div><strong>Where:</strong> {asset.where.join(", ")}</div>
          </div>
          <div className="detail-links">
            {asset.links.map((l, i) => (
              <a key={i} href={l.url} target="_blank" rel="noopener noreferrer">{"\uD83D\uDD17"} {l.label}</a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const QUICKSTART_ITEMS = [
  {
    stage: "Starting out",
    question: "\"I need to make the case for evals\"",
    answer: "Get the pitch deck and business justification to bring eval-first thinking into your engagement.",
    target: "why",
    color: "#0078D4"
  },
  {
    stage: "Building knowledge",
    question: "\"I want to understand how evals work\"",
    answer: "Watch the webinar, take the ground school training, or read the MS Learn guide to build your eval foundation.",
    target: "learn",
    color: "#107C10"
  },
  {
    stage: "Ready to build",
    question: "\"I need to design and run evals for my agent\"",
    answer: "Use the framework, scenario library, and template to define what to test \u2014 then the checklist to execute.",
    target: "implement",
    color: "#D83B01"
  },
  {
    stage: "Improving quality",
    question: "\"My evals are failing \u2014 what do I fix?\"",
    answer: "The triage playbook helps you classify failures, find root causes, and map to specific remediation actions.",
    target: "implement",
    color: "#8661C5"
  }
];

/* ── Home View ── */
function HomeView({ onPurposeClick }) {
  return (
    <div>
      <div className="anim-in">
        <h1 className="hero-title">Eval Enablement</h1>
        <p className="hero-subtitle">Get your AI agents to production quality \u2014 frameworks, templates, and playbooks for every stage.</p>
      </div>

      <div className="quickstart-section">
        <div className="quickstart-label anim-in">Where are you in your eval journey?</div>
        <div className="quickstart-grid">
          {QUICKSTART_ITEMS.map((item, i) => (
            <div
              key={i}
              className={`quickstart-card anim-in anim-d${i + 1}`}
              onClick={() => onPurposeClick(item.target)}
              style={{ borderTop: `3px solid ${item.color}` }}
            >
              <div className="quickstart-stage" style={{ color: item.color }}>{item.stage}</div>
              <div className="quickstart-question">{item.question}</div>
              <div className="quickstart-answer">{item.answer}</div>
              <div className="quickstart-arrow">{"\u2192"} View resources</div>
            </div>
          ))}
        </div>
      </div>

      <div className="purpose-flow-section">
        <div className="purpose-flow-label">Eval Journey Overview</div>
        <div className="purpose-flow">
          {PURPOSE_GROUPS.map((pg, i) => {
            const count = ASSETS.filter(a => a.purposeGroup === pg.key).length;
            return (
              <React.Fragment key={pg.key}>
                {i > 0 && <div className={`purpose-flow-arrow anim-in anim-d${i}`}>{"\u27A4"}</div>}
                <div
                  className={`purpose-flow-item anim-in anim-d${i + 1}`}
                  onClick={() => onPurposeClick(pg.key)}
                  title={`View ${pg.name} assets`}
                >
                  <div className="purpose-flow-icon" style={{ background: pg.color }}>{pg.icon}</div>
                  <div className="purpose-flow-name">{pg.name}</div>
                  <div className="purpose-flow-desc">{pg.tagline}</div>
                  <div className="purpose-flow-count">{count} asset{count !== 1 ? "s" : ""}</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      <div className="mission anim-in anim-d4">
        Your agents should be <strong>measured, not just demo'd</strong>.
        These resources take you from making the case for evals, through designing and running
        your first eval set, to triaging failures and improving agent quality over time.
      </div>
    </div>
  );
}

/* ── Why Eval? View ── */
function WhyEvalView() {
  const assets = ASSETS.filter(a => a.purposeGroup === "why");
  return (
    <div>
      <h2 className="view-title anim-in">Why Eval?</h2>
      <p className="view-subtitle anim-in anim-d1">Resources to make the case for evaluation-driven development.</p>
      {assets.map((a, i) => <AssetCard key={a.id} asset={a} />)}
    </div>
  );
}

/* ── Learn Evals View ── */
function LearnEvalsView() {
  const assets = ASSETS.filter(a => a.purposeGroup === "learn");
  return (
    <div>
      <h2 className="view-title anim-in">Learn Evals</h2>
      <p className="view-subtitle anim-in anim-d1">Conceptual learning resources to understand agent evaluation.</p>
      {assets.map((a, i) => <AssetCard key={a.id} asset={a} />)}
    </div>
  );
}

/* ── Implement Evals View ── */
function ImplementEvalsView() {
  return (
    <div>
      <h2 className="view-title anim-in">Implement Evals</h2>
      <p className="view-subtitle anim-in anim-d1">Hands-on assets to design, execute, and improve your agent evaluations.</p>

      {IMPLEMENT_SUBS.map((sub, si) => {
        const assets = ASSETS.filter(a => a.purposeGroup === "implement" && a.implementSub === sub.key);
        if (!assets.length) return null;
        return (
          <div key={sub.key} className={`subsection anim-in anim-d${si + 1}`}>
            <div className="subsection-header">
              <div className="subsection-icon">{sub.icon}</div>
              <div>
                <div className="subsection-name">{sub.name}</div>
                <div className="subsection-desc">{sub.desc}</div>
              </div>
            </div>
            {assets.map(a => <AssetCard key={a.id} asset={a} />)}
          </div>
        );
      })}
    </div>
  );
}

/* ── App ── */
function App() {
  const [view, setView] = useState("home");

  const handlePurposeClick = useCallback((purposeKey) => {
    setView(purposeKey);
  }, []);

  const navItems = [
    { key: "home",      label: "Home",            icon: "\u2302" },
    { key: "why",       label: "Why Eval?",       icon: "\uD83D\uDCA1" },
    { key: "learn",     label: "Learn Evals",     icon: "\uD83D\uDCDA" },
    { key: "implement", label: "Implement Evals", icon: "\uD83D\uDEE0\uFE0F" }
  ];

  return (
    <div>
      {/* Sidebar */}
      <nav className="sidebar">
        <div className="sidebar-brand">Microsoft</div>
        <div className="sidebar-title"><span>Eval</span> Enablement</div>
        <div className="sidebar-nav">
          {navItems.map(n => (
            <button
              key={n.key}
              className={view === n.key ? "active" : ""}
              onClick={() => setView(n.key)}
            >
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">Microsoft Confidential<br/>CAPE &middot; March 2026</div>
      </nav>

      {/* Main content */}
      <main className="main" key={view}>
        {view === "home"      && <HomeView onPurposeClick={handlePurposeClick} />}
        {view === "why"       && <WhyEvalView />}
        {view === "learn"     && <LearnEvalsView />}
        {view === "implement" && <ImplementEvalsView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
